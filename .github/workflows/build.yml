name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pypdf

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name PDFDossierBuilder pdf_dossier.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFDossierBuilder-Windows
          path: dist/PDFDossierBuilder.exe
