name: Compilar EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        pip install pypdf pyinstaller

    - name: Crear EXE
      run: |
        pyinstaller --onefile --noconsole pdf_dossier_pro.py

    - name: Subir EXE
      uses: actions/upload-artifact@v3
      with:
        name: PDFDossierBuilder
        path: dist/pdf_dossier_pro.exe
