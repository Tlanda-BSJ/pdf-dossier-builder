name: Compilar PDFDossierBuilder.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pymupdf pyinstaller

            - name: Compilar EXE con PyInstaller
        run: >
          pyinstaller --onefile --windowed --name PDFDossierBuilder
          --hidden-import=fitz
          --hidden-import=pymupdf
          --collect-all fitz
          pdf_dossier.py

      - name: Subir EXE como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: PDFDossierBuilder-Windows
          path: dist/PDFDossierBuilder.exe
