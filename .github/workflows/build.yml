name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - run: python -m pip install --upgrade pip
    - run: pip install pyinstaller pypdf

    - run: pyinstaller --onefile pdf_dossier.py

    - uses: actions/upload-artifact@v4
      with:
        name: exe
        path: dist/pdf_dossier.exe
